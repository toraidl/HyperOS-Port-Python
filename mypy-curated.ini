[mypy]
python_version = 3.10
files = main.py,src/app,src/core/context.py,src/core/props.py,src/core/rom_metadata.py,src/core/tooling.py,src/core/workspace.py,src/core/modifiers/plugin_system.py,src/core/modifiers/rom_modifier.py,src/core/modifiers/system_modifier.py,src/core/modifiers/unified_modifier.py
follow_imports = skip
ignore_missing_imports = true
warn_return_any = true
warn_unused_configs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true
